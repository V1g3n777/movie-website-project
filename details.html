<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Details</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/app.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  </head>
  <body class="dark">
    <nav class="nav">
      <div class="container-nav nav-content">
        <div class="nav-logo">
          <a href="index.html"><img src="./navImage/Logo-light.png" alt="logo" /></a>
        </div>
        <div class="nav-list">
          <ul class="nav-links">
            <li><a href="index.html" data-translate="home">Home</a></li>
            <li><a href="user.html" data-translate="favorites">Favorites</a></li>
          </ul>
        </div>
        <div class="nav-btns">
          <ul class="personal-buttons">
            <li>
              <select id="langSelector" style="background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 5px; cursor: pointer; padding: 2px 5px;"></select>
            </li>
              <li>
                <button id="themeToggle">
                  <img class="toggleImg" src="./navImage/Union.png" alt="Toggle Theme" />
                </button>
              </li>
              <li class="burger-li">
                <button id="burgerBtn" class="burger-btn">
                  <span></span>
                  <span></span>
                  <span></span>
                </button>
              </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="details-page animate-fade-in" id="detailsContainer">
       <div style="text-align: center; padding: 100px;">
         <i class="bi bi-arrow-repeat spin" style="font-size: 48px;"></i>
       </div>
    </main>

    <section class="section">
      <h3 data-translate="cast">Cast</h3>
      <div id="castCarousel" class="carousel-container"></div>
    </section>

    <footer class="footer">
      <p data-translate="footerText">Family-friendly streaming</p>
    </footer>

    <div id="videoModal" class="modal video-modal" style="display: none;">
      <div class="modal-content video-content">
        <span class="close video-close">&times;</span>
        <div class="video-container">
          <iframe id="trailerFrame" frameborder="0" allowfullscreen></iframe>
        </div>
      </div>
    </div> 

    <div id="authModal" class="modal" style="display: none;">
      <div class="modal-content">
        <span class="close">&times;</span>
        <div id="authForms">
          <form id="loginForm">
            <h2 data-translate="login">Login</h2>
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPass" placeholder="Password" required>
            <button type="submit" data-translate="login">Login</button>
            <p style="margin-top: 10px;">Don't have an account? <a href="#" id="toRegister">Register</a></p>
          </form>
          <form id="registerForm" style="display: none;">
            <h2 data-translate="register">Register</h2>
            <div style="display: flex; gap: 10px;">
              <input type="text" id="regFirstName" placeholder="First Name" required>
              <input type="text" id="regLastName" placeholder="Last Name" required>
            </div>
            <input type="email" id="regEmail" placeholder="Email" required>
            <input type="password" id="regPass" placeholder="Password" required>
            <input type="number" id="regAge" placeholder="Age" required min="1">
            <button type="submit" data-translate="register">Register</button>
            <p style="margin-top: 10px;">Already have an account? <a href="#" id="toLogin">Login</a></p>
          </form>
        </div>
      </div>
    </div>

    <script src="./js/details.js" type="module"></script>
  </body>
</html>
